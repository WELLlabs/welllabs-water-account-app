version: 0.2

# ============================================================
#  WELL LABS — AWS CodeBuild Buildspec
#  App     : SvelteKit SPA (ssr = false → adapter-static) + FastAPI
#  Output  : Static files in build/ + api/ Python package
# ============================================================

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "=== [INSTALL] Installing npm dependencies ==="
      - npm install --prefer-offline

  build:
    commands:
      - echo "=== [BUILD] Building SvelteKit static site ==="
      - npm run build
      - echo "Build complete."
      - echo "  → Built files:"
      - ls -lh build/

  post_build:
    commands:
      - echo "=== [POST-BUILD] Assembling deployment artifact ==="
      # Ship what CodeDeploy needs:
      #   build/      → static site (index.html, _app/, assets)
      #   api/        → FastAPI QGZ service (no .venv)
      #   devops/     → nginx + systemd + lifecycle scripts
      #   appspec.yml → CodeDeploy entry point
      - mkdir -p deploy_artifact
      - cp -r build     deploy_artifact/
      - cp -r devops    deploy_artifact/
      - cp appspec.yml  deploy_artifact/
      # Copy API source only (exclude local venv / caches if present)
      - mkdir -p deploy_artifact/api
      - |
        tar -C api -cf - \
          --exclude='.venv' --exclude='__pycache__' --exclude='*.pyc' . \
          | tar -C deploy_artifact/api -xf -
      # Make all shell scripts executable inside the artifact
      - chmod +x deploy_artifact/devops/scripts/*.sh || true
      - echo "Artifact contents:"
      - find deploy_artifact -type f | sort

artifacts:
  base-directory: deploy_artifact
  files:
    - "**/*"
  discard-paths: no

cache:
  paths:
    - node_modules/**/*
