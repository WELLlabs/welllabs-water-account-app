version: 0.0
os: linux

# ============================================================
#  WELL LABS — AWS CodeDeploy AppSpec
#  App Type   : SvelteKit SPA (static — ssr = false) + FastAPI
#  Web Server : Nginx (static build/ + reverse proxy /fwa-api → :8010)
#  Strategy   : Releases directory + atomic symlink swap
# ============================================================

files:
  - source: /
    destination: /opt/welllabs/package

permissions:
  - object: /opt/welllabs/package
    pattern: "**"
    owner: ubuntu
    group: ubuntu
    type:
      - file
      - directory

hooks:
  # Prepare release directory, handle apt locks
  BeforeInstall:
    - location: devops/scripts/before_install.sh
      timeout: 180
      runas: root

  # Copy build+api → release, nginx + systemd unit, venv, symlink swap
  AfterInstall:
    - location: devops/scripts/after_install.sh
      timeout: 900
      runas: root

  # Start/restart FastAPI + reload nginx
  ApplicationStart:
    - location: devops/scripts/application_start.sh
      timeout: 120
      runas: root

  # Health checks — fail → CodeDeploy auto-rollback
  ValidateService:
    - location: devops/scripts/validate_service.sh
      timeout: 90
      runas: root
